<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflexion - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container narrow auth-shell">
    <p class="eyebrow">Reflexion Universe</p>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Chaque compte a accès au style premium et fun.</p>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form method="post" th:action="@{/register}">
        <label>Username</label>
        <input name="username" required>
        <label>Mot de passe</label>
        <input name="password" type="password" required>
        <button type="submit">S'inscrire</button>
    </form>
    <a class="auth-link" th:href="@{/login}">Retour login</a>
    <section class="fun-resources">
        <h2>Starter pack</h2>
        <a href="https://lichess.org/practice" target="_blank" rel="noopener noreferrer">Practice tactical chess</a>
        <a href="https://www.websudoku.com/" target="_blank" rel="noopener noreferrer">Web Sudoku</a>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.global.min.js"></script>
<script th:src="@{/js/ui-motion.js}"></script>
</body>
</html>
